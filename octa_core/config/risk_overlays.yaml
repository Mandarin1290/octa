# Non-destructive gate tuning overlay.
# Applied ONLY when features.gate_tuning.enabled=true via scripts/run_octa.py.

overlay:
  gate_version: "overlay_2026-01-13_v1"

  # Conservative tuning: relax model-quality gates modestly.
  # Values are deltas or replacements depending on field name.
  # The wrapper will apply only to known numeric thresholds.
  relax:
    sharpe_min_factor: 0.85           # e.g. -15% Sharpe floor
    stability_window_factor: 0.90     # e.g. -10% stability windows
    required_folds_pass_ratio_min: 0.60

  # Portfolio-level constraints to compensate for relaxed per-model gates.
  portfolio_controls:
    paper_target_symbols: [50, 300]
    live_target_symbols: [20, 120]
    min_liquidity:
      enabled: true
      # use existing pipeline liquidity filter; wrapper enforces minimum only as a prefilter.
      min_adv_usd: 1000000

  # Probation policy: borderline pass => paper-only.
  probation:
    enabled: true
    paper_only_days: 20
    reduced_size_factor: 0.25

  # Slow-mode fallback: allow 1D-only assets under tighter sizing.
  slow_mode:
    enabled: true
    max_trades_per_day: 1
    reduced_size_factor: 0.25
