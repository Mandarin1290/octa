[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line-too-long — enforced by formatter, not as an error
]

[tool.ruff.lint.per-file-ignores]
# Test files: fixtures import for re-export, helper vars may be unused, `l` for lines
"tests/*" = ["F401", "E402", "E741", "F841"]
# Scripts manipulate sys.path before imports; ops scripts have late conditional imports
"scripts/*" = ["E402"]
"octa/support/ops/*" = ["E402"]
"octa_ops/*" = ["E402"]
# Existing modules with imports after class/function defs (restructuring not in scope)
"octa/core/execution/*" = ["E402"]
"octa/core/research/*" = ["E402"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = false
files = ["octa/core", "octa_training/core", "octa_ops/autopilot"]
exclude = '^(scripts/|tests/|octa/support/ops/|octa/support/|octa_training/run_.*\.py$)'

[tool.bandit]
skips = []
exclude_dirs = ["tests", ".venv"]
