[mypy]
python_version = 3.11
# Relax strictness to reduce noise while we iteratively fix types.
strict = False
warn_unused_configs = True
follow_imports = skip
no_site_packages = True

# Avoid ambiguous module resolution (e.g., core/training_safety_lock.py showing up as both
# "training_safety_lock" and "core.training_safety_lock" depending on package bases).
explicit_package_bases = True

# Typed core lane only.
files = octa/core/**/*.py
exclude = (?x)^(scripts/|dagster/|artifacts/|mlruns/|raw/|reports/|logs/|models/|catboost_info/|docker/|deploy/|k8s/|state/|octa_training/|okta_altdat/|octa_stream/|octa_altdata/|octa_core/)

# Don't fail the build on missing stubs and common partial-typing patterns.
disable_error_code = import-untyped,var-annotated,attr-defined,assignment,arg-type,call-arg,union-attr,index,misc,dict-item,return-value,operator

[mypy-pyarrow.*]
ignore_missing_imports = True

[mypy-vectorbt.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas_ta]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-psutil]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-okta_altdat.*]
ignore_errors = True

[mypy-octa_stream.*]
ignore_errors = True

[mypy-octa_altdata.*]
ignore_errors = True

[mypy-octa_training.*]
ignore_errors = True

[mypy-octa_core.*]
ignore_errors = True
