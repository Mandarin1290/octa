# AltData Platform Config (safe defaults)
# Default: disabled to avoid any silent behavior change.

enabled: true

# ─── Training vs Refresh mode ────────────────────────────────────────────────
# offline_only: true  → TRAINING MODE (default)
#   The feature pipeline reads ONLY from local cache snapshots (octa/var/altdata/).
#   If a source snapshot is missing: evidence error in meta, training continues
#   without those features. No live network call is ever made during training.
#   Override per-run: env OKTA_ALTDATA_OFFLINE_ONLY=0
#
# offline_only: false → REFRESH MODE (used by scripts/run_altdata_refresh.py)
#   The orchestrator (build_altdata_stack) may fetch live data when allow_net=True.
#   This path is only triggered by the daily refresh script, never by training.
# ─────────────────────────────────────────────────────────────────────────────
offline_only: true

# If true, any detected future-leakage will mark features invalid.
# Strict mode can also be set via env `OKTA_ALTDATA_STRICT=1`.
strict_mode: false

# Allow the bootstrapper to auto-install missing deps via pip.
# Can also be set via env `OKTA_ALTDATA_AUTO_INSTALL=1`.
auto_install: false

storage:
  # Optional override; otherwise uses env OKTA_ALTDATA_ROOT or ./data/altdat
  root: octa/var/altdata

asof:
  # tolerance in seconds per inferred timeframe
  tolerance_seconds:
    "1D": 3888000   # 45 days
    "1H": 604800    # 7 days
    "30m": 259200   # 3 days
    "5m": 86400     # 1 day
    "1m": 21600     # 6 hours

sources:
  fred:
    enabled: true
    api_key_env: FRED_API_KEY
    # v0.0.0: added CPI/inflation series for rate_hike_2022 crisis robustness.
    # CPIAUCSL/CPILFESL: monthly, yoy pct-change → feat_altdat_macro_fred_cpi_yoy etc.
    # T10YIE: daily inflation breakeven (market-implied) → leading indicator vs lagging CPI.
    # UNRATE/DGS10/DGS2/FEDFUNDS: existing macro rates suite.
    series:
      - id: FEDFUNDS
        feature_name: feat_fedfunds
        frequency: monthly
        transform: level
      - id: DGS10
        feature_name: feat_treasury_10y
        frequency: daily
        transform: level
      - id: DGS2
        feature_name: feat_treasury_2y
        frequency: daily
        transform: level
      - id: UNRATE
        feature_name: feat_unemployment
        frequency: monthly
        transform: level
      - id: CPIAUCSL
        feature_name: feat_cpi_yoy
        frequency: monthly
        transform: yoy_pct_change
      - id: CPILFESL
        feature_name: feat_cpi_core_yoy
        frequency: monthly
        transform: yoy_pct_change
      - id: T10YIE
        feature_name: feat_inflation_breakeven
        frequency: daily
        transform: level
      # Tier-B: macro regime indicators (yield curve, credit, stress)
      # Added 2026-04-15 — fetch via run_altdata_refresh.py after FRED key confirmed.
      - id: T10Y2Y
        feature_name: feat_yield_curve_10y2y
        frequency: daily
        transform: level
      - id: BAMLH0A0HYM2
        feature_name: feat_hy_spread
        frequency: daily
        transform: level
      - id: STLFSI2
        feature_name: feat_stress_index
        frequency: weekly
        transform: level
  edgar:
    enabled: false
    forms: ["10-K", "10-Q", "8-K"]
    user_agent: "OCTA Research (training; offline cache preferred)"
  cot:
    enabled: false
    window_days: 730
    release_offset_days: 3
    release_hour_utc: 20
    targets:
      - id: es
        candidates: ["e-mini s&p 500", "s&p 500 e-mini", "s&p 500 stock index"]
      - id: nq
        candidates: ["e-mini nasdaq 100", "nasdaq-100", "nasdaq 100"]
      - id: zn
        candidates: ["10-year u.s. treasury note", "u.s. treasury notes, 10-yr"]
      - id: gc
        candidates: ["gold", "gold - commodity exchange inc."]
      - id: cl
        candidates: ["crude oil", "wti crude oil", "crude oil, light sweet"]
  news_events:
    enabled: false  # Reads from cache only (offline_only=true); enable after first refresh
    forms: ["10-K", "10-Q", "8-K"]
  earnings:
    enabled: false  # PILOT: disabled (no cache)
  xbrl:
    enabled: false  # PILOT: disabled (no cache)
  gdelt:
    enabled: true
  satellite:
    enabled: true
    nasa_firms:
      enabled: true
    viirs_nightlights:
      enabled: true

weights:
  base:
    edgar: 0.35
    macro: 0.25
    market: 0.15
    news: 0.15
    satellite: 0.10
  quality:
    min_coverage: 0.5
    stale_days: 45
