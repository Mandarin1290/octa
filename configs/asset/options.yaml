## Per-asset-class overrides for Options (daily-only policy)
## Options data provider delivers only end-of-day snapshots; use daily models.
gates:
  by_asset_class:
    option:
      sharpe_min: 0.1
      max_drawdown_max: 0.8
      min_trades: 20
      required_folds_pass_ratio: 0.0

# Splits tuned for daily options models (lower history requirements for daily snapshots)
splits:
  n_folds: 3
  train_window: 500
  test_window: 100
  step: 100
  purge_size: 0
  embargo_size: 0
  min_train_size: 200
  min_test_size: 50
  min_folds_required: 1

# Feature engineering overrides for options
features:
  horizons: [1, 3, 5]
  vol_window: 10

# Tuning smaller for daily options (faster tests; disable heavy tuning by default)
tuning:
  optuna_trials: 20
  enabled: false

# Packaging/workflow hints
packaging:
  compare_metric_name: 'sharpe'
  min_improvement: 0.0

broker:
  name: ibkr
  cost_bps: 2.0
  spread_bps: 1.0

liquidity:
  enabled: false
  min_adv_usd: 250000
