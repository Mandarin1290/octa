# Asset-class overlay: stocks/equities

signal:
  vol_target: 0.12

broker:
  cost_bps: 2.0
  spread_bps: 1.0
  stress_cost_multiplier: 3.0

features:
  horizons: [1, 3, 5]
  min_return_filter_vol_mult: null
  macro:
    enabled: true
    source: duckdb
    altdat_duckdb_path: octa/var/altdata/altdat.duckdb
    series: [FEDFUNDS, DGS10, DGS2, UNRATE]
    shift_bars: 1

session:
  enabled: true
  timezone: America/New_York
  open: "09:30"
  close: "16:00"
  weekdays: [0, 1, 2, 3, 4]
