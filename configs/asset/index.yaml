# Asset-class overlay for indices (non-HFT, conservative defaults)
# Keep splits compatible with daily/hourly data and avoid HF-sized windows.
features:
  window_short: 3
  window_med: 10
  window_long: 30
  vol_window: 20
  horizons: [1, 3, 5]

# Splits tuned for non-HFT index data (daily/hourly compatible)
splits:
  n_folds: 5
  train_window: 1000
  test_window: 200
  step: 200
  purge_size: 10
  embargo_size: 5
  min_train_size: 500
  min_test_size: 100
  min_folds_required: 1
  expanding: true

# Allow slightly more permissive parquet settings for indices
parquet:
  nan_threshold: 0.3
  allow_negative_prices: false
  resample_enabled: false
  resample_bar_size: "1D"

# Lower volatility target for index signals
signal:
  vol_target: 0.03
  leverage_cap: 1.0
  # conservative activation thresholds
  upper_q: 0.90
  lower_q: 0.10

# Broker/cost assumptions for index trading
broker:
  name: ibkr
  cost_bps: 2.0
  spread_bps: 1.0
  stress_cost_multiplier: 2.0

session:
  enabled: true
  timezone: America/New_York
  open: "09:30"
  close: "16:00"
  weekdays: [0, 1, 2, 3, 4]

# Gate overrides tuned for conservative index experimentation
gates:
  by_asset_class:
    index:
      sharpe_min: 0.5
      max_drawdown_max: 0.35
      min_trades: 10
      required_folds_pass_ratio: 0.5
