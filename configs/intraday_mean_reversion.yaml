mode: DEV
env: dev
service_name: octa-intraday-mr-dev

# Mean-reversion cascade: entry at 1H, same as breakout but now with strict feature isolation.
cascade_timeframes:
  - 1H
  - 30M
  - 5M
  - 1M

broker:
  requires_secret: false
  cost_bps: 2.0
  spread_bps: 1.0

# Session filter: identical to intraday_breakout.yaml
session:
  enabled: true
  timezone: America/New_York
  open: "09:35"
  close: "15:50"
  weekdays: [0, 1, 2, 3, 4]

features:
  window_short: 5
  window_med: 10
  window_long: 20
  vol_window: 10
  horizons: [1, 3]
  intraday_breakout:
    range_expansion_window: 10
    rel_volume_window: 10
    range_rank_window: 20
    vwap_z_clip: 3.0
    range_ratio_clip: 4.0
    rel_volume_clip: 5.0
    momentum_consistency_lookback: 3

signal:
  mode: cls
  upper_q: 0.85
  lower_q: 0.15
  causal_quantiles: true
  quantile_window: 500
  vol_target: 0.02
  leverage_cap: 1.0

# Per-timeframe walk-forward split overrides.
# 1H: train_window=5000 caps IS to ~3 years of 1H bars — focuses on recent microstructure.
# step=test_window ensures non-overlapping OOS (no data reuse across folds).
splits_by_timeframe:
  1H:
    test_window: 960
    step: 960
    n_folds: -5
    train_window: 5000
    expanding: false
    purge: 12
    embargo: 6
  30M:
    test_window: 500
    step: 500
    n_folds: -5
    train_window: 10000
    expanding: false
    purge: 26
    embargo: 13
  5M:
    test_window: 2000
    step: 2000
    n_folds: -5
    purge: 78
    embargo: 39
  1M:
    test_window: 6500
    step: 6500
    n_folds: -5
    purge: 390
    embargo: 195
