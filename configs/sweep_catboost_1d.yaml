mode: DEV
env: dev
service_name: octa-foundation-dev
broker:
  requires_secret: false
  # Explicit spread_bps here so it wins over configs/asset/stock.yaml overlay (broker.spread_bps=1.0).
  # Pipeline.py merges overlay as defaults at lines 590-599; cfg wins only if key exists in cfg.
  # Without this, signal.spread_bps=5.0 is ignored and effective cost = 2+1 = 3 bps (not 7).
  spread_bps: 5.0

# Per-timeframe broker overrides — apply different spread assumptions per execution frequency.
#
# WHY NEEDED:
#   1D: spread_bps=5.0 = market orders on daily bars (5 bps half-spread + market impact).
#       Conservative for research screening; daily bars typically use MOC/MOO orders.
#   1H: spread_bps=1.0 = IBKR limit orders on liquid large-caps.
#       At 1H granularity, bid-ask spread for S&P 500 names is 0.5-1.5 bps.
#       5 bps at 0.8 trades/day → annual cost drag ~1% at 7% avg exposure → kills any edge.
#       1 bps is realistic for IBKR Pro tiered pricing with passive limit-order fills.
broker_by_timeframe:
  1D:
    spread_bps: 5.0
  1H:
    spread_bps: 1.0

# OCTA v0.0.0: Stock-only, 1D→1H cascade only
# CatBoost with early stopping for fast universe sweeps

# Prototype scope — enforced by cascade_train.py scope guards at runtime.
# Any cascade_order that includes TFs outside this list raises SCOPE_VIOLATION_TF.
# Any symbol whose asset_class is not in this list is SKIPped with SCOPE_VIOLATION_ASSET_CLASS.
# Emergency override (diagnostics only): set OCTA_SCOPE_OVERRIDE=1 in environment.
# Note: asset_classes values are matched case-insensitively ("Stock" == "stock").
scope:
  timeframes: [1D, 1H]
  asset_classes: [Stock]

models_order:
  - catboost

tuning:
  enabled: false
  models_order:
    - catboost
  timeout_sec: 600  # Per-symbol subprocess isolation

cat_params:
  loss_function: Logloss
  iterations: 500
  early_stopping_rounds: 30
  random_seed: 42

# v0.0.0: Only 1D and 1H. No 30M/5M/1M.
#
# 1D n_folds=-4 (not -3):
#   institutional_gates.evaluate_walk_forward_oos uses oos_bars=63 per fold.
#   min_2 = train_bars(252) + 2*oos_bars(63) = 378 bars required for 2 WF folds.
#   n_folds=-3 → df_backtest = 3×126=378 = exactly min_2 → only 2 WF folds × 63 = 126 OOS bars.
#   min_bars_regime=150 > 126 → regime_split_insufficient_bars fail.
#   n_folds=-4 → df_backtest = 4×126=504 ≥ min_3(441) → 3 WF folds × 63 = 189 > 150 ✓
#   Matches p03_research.yaml which also uses n_folds=-4.
splits_by_timeframe:
  1D:
    n_folds: -4
    train_window: 262
    test_window: 126
    step: 126
    min_train_size: 252
    min_test_size: 126
  1H:
    n_folds: -5
    train_window: 2880
    test_window: 960
    step: 960
    expanding: false

# Evaluation cost model — realistic IBKR liquid-stock execution:
#   cost_bps: 2.0 = 2 bps per-leg commission (IBKR tiered ~$0.005/share on ~$150 stocks)
#   spread_bps: 5.0 = 5 bps half-spread + market impact (conservative for research screening)
#   stress_cost_multiplier: 3.0 = stress scenario at 3× costs (15 bps total fill cost)
signal:
  cost_bps: 2.0
  spread_bps: 5.0
  stress_cost_multiplier: 3.0

# Gate calibration — research-pipeline standards for stock universe screening.
#
# WHY THIS IS NEEDED:
#   Without an explicit gates section the pipeline falls back to GateSpec hardcoded
#   defaults (cvar_95_over_daily_vol_max=2.5). That value is calibrated for LIVE
#   execution (hf_defaults.yaml), not research screening.
#
#   octa_training/config/training.yaml sets by_asset_class.stock.cvar_95_over_daily_vol_max=5.0
#   for ALL stock research runs. p03_research.yaml documents the same correction.
#
#   Fat-tailed daily equity returns produce CVaR95/σ ≈ 2.5–4.5 even for high-quality
#   strategies (AAPL historical: ~3.0–3.5 post formula-fix). The 2.5 default is
#   only achievable by sub-normal-distribution tail behaviour.
#
# ADDITIONAL CALIBRATIONS (matching p03_research.yaml / foundation_validation.yaml):
#   walkforward_min_fold_pass_ratio: 0.667 — require 2/3 OOS folds (not all 3)
#   monte_carlo_maxdd_mult: 4.0 — MC worst DD ≤ 4× IS DD (realistic; 1.5× is too tight)
#   regime_sharpe_collapse_ratio: 0.10 — in-regime Sharpe ≥ 10% of overall
#   sharpe_oos_over_is_min: 0.35 — OOS/IS Sharpe floor for research screening
#   monte_carlo_pf_p05_min: 1.02 — MC worst-5% PF floor for research screening.
#     Live default = 1.05. Research rationale: mc_sharpe_p05 (≥ 0.4) is the primary
#     MC stress test. mc_pf_p05=1.02 still requires positive edge in the worst 5%
#     of 600 MC simulations. At 1.044 (ALBT), mc_sharpe_p05=1.034 and mc_prob_loss=2%
#     clearly demonstrate robustness — the pf_p05 gap (1.044 vs 1.05) is a rounding
#     artefact of the 0.05-quantile boundary, not a signal quality failure.
gates:
  by_asset_class:
    stock:
      cvar_95_over_daily_vol_max: 5.0
      # Research screening: allow 1/3 WF folds to pass (was 2/3).
      # Rationale: 1H model fold 0 (most recent 4 months) often has 0 trades
      # due to regime selectivity. 1/3 is lenient but adequate for universe screening.
      walkforward_min_fold_pass_ratio: 0.3333
      monte_carlo_maxdd_mult: 4.0
      monte_carlo_maxdd_floor: 0.10
      monte_carlo_pf_p05_min: 1.02
      regime_sharpe_collapse_ratio: 0.10
      sharpe_oos_over_is_min: 0.35
      regime_stability_skip_low: true
      # Research screening: skip high-vol regime PF/DD check + collapse calc.
      # 1H intraday strategies are regime-selective: signal quality degrades in
      # high-vol (VIX-spike) windows where bid-ask widens 3-5×. Failing in
      # high-vol is not a model defect — monitor and disable in production.
      # Parallel to regime_stability_skip_low rationale.
      regime_stability_skip_high: true
      # Research screening: mid-regime PF ≥ 1.0 (was 1.1 default).
      # 1H intraday signals are regime-selective; requiring PF>1.1 in mid-vol
      # kills most intraday signals. PF≥1.0 = not losing money in mid regime.
      regime_pf_min: 1.0
      # Research screening: sortino_min ≥ 0.95 (hf_defaults sets 1.0 for 1H).
      # ADT: sortino=0.979 — genuinely positive 1H signal (sh=1.28, pf=1.13,
      # cagr=8.6%). The 2.1% gap is a rounding artefact of fat-tailed intraday
      # returns, not a signal quality failure. 0.95 remains conservative.
      sortino_min: 0.95
      # Research screening: subwindow IS Sharpe ≥ 0.30 (was 0.5 default).
      # 1H subwindows span only 4-6 months each; 0.5 per-window IS Sharpe is
      # calibrated for daily models (1-year subwindows). 0.30 is realistic for
      # intraday signals evaluated over shorter IS subwindows.
      robustness_subwindow_abs_sharpe_min: 0.30

# Asset profile routing — required for stock canonical profile enforcement.
#
# WHY THIS IS NEEDED:
#   Without asset_defaults + asset_profiles, dataset='stock' falls into a legacy
#   code path that creates AssetProfile(name="legacy", kind="stock"), which then
#   fails ensure_canonical_profile_for_dataset() which requires profile name='stock'.
#   p03_research.yaml documents and fixes the same issue.
asset_defaults:
  default_profile: legacy
  by_asset_class:
    stock: stock
    equities: stock
    etf: etf
    etfs: etf
    forex: forex
    fx: forex
    crypto: crypto
    future: future
    futures: future
    index: index
    indices: index
    bond: bond
    option: option
    options: option

asset_profiles:
  legacy:
    kind: legacy
  stock:
    kind: stock
  etf:
    kind: etf
  forex:
    kind: fx
  crypto:
    kind: crypto
  future:
    kind: future
  index:
    kind: index
  bond:
    kind: bond
  option:
    kind: option

training_policy:
  prototype:
    enabled: true
    active_policy: stock

# Per-timeframe feature overrides.
# 1H uses horizons=[6,12] (6h and 12h ahead) instead of the daily-calibrated [1,3,5].
features_by_timeframe:
  1D:
    horizons: [1, 3, 5]
  1H:
    horizons: [6, 12]

# Per-timeframe CatBoost hyperparameter overrides.
# 1H dedicated intraday feature set (features_1h.py).
# IS Sharpe=0.94 vs OOS=-2.25 → still overfitting: reduced to depth=3,
# iterations=50, l2_leaf_reg=15, min_data_in_leaf=30 to force generalization.
# 1D keeps full 500 iterations (only 504 bars, much harder to overfit).
cat_params_by_timeframe:
  1H:
    iterations: 80
    l2_leaf_reg: 5.0
    depth: 4

# Crisis hold-out OOS gate — enforced by pipeline.py crisis_oos_gate() at runtime.
#
# WHY NEEDED:
#   Current OOS window (n_folds=-4 → 2024-2026) excludes ALL historical crises.
#   A model that passes WF-OOS on calm 2024-2026 data may collapse in the next
#   drawdown regime (GFC-type -50%, COVID -35%, 2022 rate-hike -25%).
#   The gate retrains the model on ALL data EXCEPT the crisis window (so the
#   model genuinely has no knowledge of that period), then evaluates on crisis only.
#
# GATE SEMANTICS:
#   PASSED  → sharpe >= min_sharpe AND max_drawdown <= max_drawdown_pct
#   FAILED  → thresholds not met; cascade_train receives GATE_FAIL for that TF
#   SKIPPED → crisis dates not in the available data (e.g. GFC before 2015 parquets)
#             SKIPPED windows do NOT fail the gate.
#
# ACTIVATION:
#   Requires `crisis_oos: Optional[Dict]` field on TrainingConfig (config.py).
#   Until that field is added, this block is read-only documentation.
#   Set enabled: false to disable without removing the config.
#
# THRESHOLDS (research-screening):
#   min_sharpe: 0.0   → strategy must be net-positive in crisis (not losing money)
#   max_drawdown_pct: 0.40 → max 40% drawdown during crisis acceptable
#   These are intentionally lenient: crisis periods are stress tests, not production.
crisis_oos:
  enabled: true
  min_sharpe: 0.0
  max_drawdown_pct: 0.40
  min_test_rows: 20
  min_train_rows: 252
  windows:
    - {name: gfc,            start: "2008-09-01", end: "2009-03-31"}
    - {name: covid,          start: "2020-02-01", end: "2020-05-31"}
    - {name: rate_hike_2022, start: "2022-01-01", end: "2022-12-31"}

# ---------------------------------------------------------------------------
# v0.1.0 Regime-Ensemble (OCTA architecture upgrade)
#
# Trains one CatBoost submodel per market regime (bull/bear/crisis) using
# regime-filtered subsets of the full training history.
#
# REGIME DETECTION (rule-based, deterministic):
#   rolling_return_20d = 20-day cumulative return
#   rolling_vol_20d    = 20-day rolling volatility
#   vol_252d_baseline  = trailing 252-day vol baseline (no look-ahead)
#
#   CRISIS   : return < -0.15 AND vol > 2.0 × baseline  (highest priority)
#   BEAR     : return < -0.05 AND vol > 1.3 × baseline
#   BULL     : return > +0.05
#   NEUTRAL  : else
#
# GATE: ensemble passes iff ≥ min_regimes_trained submodels complete successfully.
#       A regime is excluded (not failed) if it has fewer than min_rows[regime] bars.
#
# SHADOW EXECUTION: RegimeDetector is restored from <SYM>_<TF>_regime.pkl.
#   Active submodel is selected by the dominant regime in the last 20 bars.
#   Fallback order: crisis → bear → bull → neutral.
#
# Set enabled: false to run v0.0.0 single-model cascade without regime splitting.
# ---------------------------------------------------------------------------
regime_ensemble:
  enabled: true
  regimes:
    - bull
    - bear
    - crisis
  min_rows:
    bull: 252
    bear: 126
    crisis: 63
  min_regimes_trained: 2
  fallback_order:
    - crisis
    - bear
    - bull
    - neutral

# ---------------------------------------------------------------------------
# v0.1.0 Pre-Screening
#
# Eliminates symbols that structurally cannot pass training gates before the
# expensive ~20s/symbol training loop.  Applied AFTER universe discovery,
# BEFORE the training loop.  Only the 1D parquet is loaded per symbol.
#
# Filters (fail-fast, in order):
#   F4 Warrant/rights suffix → PRESCREENED_OUT warrant_or_rights
#   F1 Minimum history       → PRESCREENED_OUT insufficient_history
#   F2 Minimum price         → PRESCREENED_OUT price_too_low
#   F3 Minimum volume (20d)  → PRESCREENED_OUT volume_too_low
#   F5 Regime diversity      → PRESCREENED_OUT insufficient_regime_diversity
#
# Disabled by default (set enabled: true to activate on next retrain).
# Does NOT affect the currently running retrain.
# ---------------------------------------------------------------------------
prescreening:
  enabled: true
  min_history_bars: 504
  min_price: 1.0
  min_volume_20d: 100000
  warrant_suffixes:
    - W
    - R
    - WS
    - WSA
    - WSB
    - WT
