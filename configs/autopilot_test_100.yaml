# Testlauf B — 100-symbol universe smoke test.
# Purpose: validate gate pass-rates and cascade scaling with wider symbol pool.
# NOT for production use. No paper.enabled, no policy changes.
#
# Key differences from autopilot_test_50.yaml:
#   - limit: 100  (doubled pool; gate evaluation covers twice as many symbols)
#   - dynamic_gate.min_population: 50  (proportionally larger for 100-symbol pool)
#   - max_runtime_s: 36000  (10 hours; gate eval ~doubled vs 50-symbol run)
# Training budget unchanged (still capped at 5 symbols per TF).

run_id: null

registry_root: artifacts
reports_dir: reports
pkl_dir: raw/PKL
training_config: configs/dev.yaml
runtime_profile: default

universe:
  stock_dir: raw/Stock_parquet
  fx_dir: raw/fx
  futures_dir: raw/futures
  asset_map_path: assets/asset_map.yaml
  limit: 100

timeframes: [1D, 1H, 30M, 5M, 1M]
cascade_order: [1D, 1H, 30M, 5M, 1M]

data_quality:
  max_duplicate_frac: 0.001
  max_missing_frac: 0.02
  min_spacing_match_frac: 0.95
  spacing_tolerance_seconds: 120
  require_utc_timezone: true
  allow_naive_timestamps: false

global_gate:
  min_history_days: 252
  max_drawdown_max: 0.6
  max_vol_annual: 2.5
  fred_enabled: false
  edgar_enabled: false

budgets:
  max_runtime_s: 36000
  max_ram_mb: 14000
  max_threads: 4
  max_disk_mb: 20000

dynamic_gate:
  enabled: true
  method: percentile_rank
  min_population: 50
  top_percentile: 0.70
  fallback_top_k_if_empty: 1
  required_metrics: [sharpe, pf, calmar, max_dd]
  metrics:
    sharpe: {direction: high, weight: 0.35}
    pf: {direction: high, weight: 0.25}
    calmar: {direction: high, weight: 0.20}
    max_dd: {direction: low, weight: 0.20}

training_budget:
  enabled: true
  max_train_symbols_per_tf:
    1D: 5
    1H: 5
    30M: 3
    5M: 2
    1M: 0
  selection_method: history_ranked
  decouple_tf_pool_from_prev_tf: true
  per_symbol_timeout_s: 600
  stage_timeout_s: 7200
  stop_after_first_candidate: false

debug:
  one_symbol: null
  max_internal_steps: null

paper:
  enabled: false
