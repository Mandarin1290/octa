mode: DEV
env: dev
service_name: octa-foundation-dev
broker:
  requires_secret: false

# Per-timeframe walk-forward split overrides.
# Each entry merges on top of the default `splits` dict.
#
# n_folds MUST be negative — negative n_folds selects the LAST (most recent)
# folds from the dataset.  Positive n_folds uses the OLDEST data.
#
# train_window for intraday TFs matches the institutional_gates TimeWindowPolicy:
#   1H train_bars=24*120=2880, 30M=13*120=1560, 5M=78*80=6240, 1M=390*60=23400
# test_window covers enough OOF bars (min_3 = train_bars + 3*oos_bars):
#   1H:  min_3 = 2880+3*480=4320 → 3*960=2880 → borderline; n_folds=-3 uses most recent
#   30M: min_3 = 1560+3*260=2340 → 3*500=1500 → ok
#   5M:  min_3 = 6240+3*1170=9750 → 3*2000=6000 → ok
#   1M:  min_3 =23400+3*3900=35100 → 3*6500=19500 → ok
splits_by_timeframe:
  1D:
    n_folds: -3
    train_window: 262
    test_window: 126
    step: 126
    min_train_size: 252
    min_test_size: 126
  1H:
    n_folds: -3
    train_window: 2880
    test_window: 960
    step: 960
  30M:
    n_folds: -3
    train_window: 1560
    test_window: 500
    step: 500
  5M:
    n_folds: -3
    train_window: 6240
    test_window: 2000
    step: 2000
  1M:
    n_folds: -3
    train_window: 23400
    test_window: 6500
    step: 6500
