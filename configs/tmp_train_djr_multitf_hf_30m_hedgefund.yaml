# HF/Hedgefund-level 30m training override
# Goal: make 30m training discipline match the 1H HF-style settings.
# Base: configs/tmp_train_djr_multitf_hf.yaml + global configs/hf_defaults.yaml merge.

paths:
  # Use the unified repo raw/ directory (stocks daily/1H/30m parquets live here)
  raw_dir: "/home/n-b/Octa/raw"

features:
  horizons: [1, 3, 5]
  aviation:
    enabled: true
    region: GLOBAL

signal:
  mode: cls
  upper_q: 0.95
  lower_q: 0.05
  causal_quantiles: true
  quantile_window: 252
  leverage_cap: 1.0
  vol_target: 0.03
  realized_vol_window: 20
  cost_bps: 2.0
  spread_bps: 1.0
  stress_cost_multiplier: 3.0

tuning:
  enabled: true
  optuna_trials: 400
  early_stop_rounds: 20
  timeout_sec: 3600
  models_order: [lightgbm, hgb]

retrain:
  skip_window_days: 0

splits:
  n_folds: -6
  train_window: 500
  test_window: 100
  step: 100
  purge_size: 10
  embargo_size: 5
  min_train_size: 500
  min_test_size: 100
  expanding: true
  min_folds_required: 1

packaging:
  min_free_gb: 8

layers:
  # Keep 1H unchanged (already HF-grade)
  struct_1h:
    features:
      horizons: [6, 12]
    tuning:
      enabled: true
      optuna_trials: 400
      timeout_sec: 3600
    signal:
      upper_q: 0.97
      lower_q: 0.03
      leverage_cap: 1.0
      vol_target: 0.02

  # Upgrade 30m to HF/Hedgefund-level discipline (mirror 1H tuning + tighter quantiles)
  struct_30m:
    features:
      horizons: [1, 3]
      aviation:
        enabled: false
    tuning:
      enabled: true
      optuna_trials: 400
      timeout_sec: 3600
      early_stop_rounds: 20
      models_order: [lightgbm, hgb]
    signal:
      upper_q: 0.97
      lower_q: 0.03
      leverage_cap: 1.0
      vol_target: 0.02

  # Leave research layers unchanged (still non-live by default)
  entry_5m:
    features:
      horizons: [3]
      aviation:
        enabled: false
    tuning:
      enabled: false
    splits:
      n_folds: -3
    signal:
      upper_q: 0.995
      lower_q: 0.005
      leverage_cap: 0.5
      vol_target: 0.01

  exec_1m:
    features:
      horizons: [5]
      aviation:
        enabled: false
    tuning:
      enabled: false
    splits:
      n_folds: -2
    signal:
      upper_q: 0.995
      lower_q: 0.005
      leverage_cap: 0.3
      vol_target: 0.008
