name: Feast Materialize Integration

on:
  workflow_dispatch:
  push:
    paths:
      - 'feast_repo/**'
      - 'tests/integration/**'

jobs:
  feast-materialize:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          python -m pip install --upgrade pip

      - name: Install Feast + test deps
        run: |
          pip install feast redis pytest fakeredis

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-runtime.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run integration tests
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          set -euo pipefail
          # run pytest
          pytest -q tests/integration/test_feast_materialize.py -q
          # Retry materialize in case of transient failures when run in CI
          echo 'Retrying materialize as a smoke check'
          for i in 1 2 3; do
            echo "Attempt $i"
            if feast materialize-incremental 2025-12-31T23:59:59; then
              echo 'materialize succeeded'
              break
            else
              echo 'materialize failed, retrying after backoff'
              sleep $((i*10))
            fi
          done
