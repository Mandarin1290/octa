name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal tools
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir "pytest>=8.0" "ruff>=0.1.270" "mypy>=1.6.1"
      - name: Run full audit script
        run: bash scripts/run_full_audit.sh

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r config/requirements.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy .
      - name: Tests
        run: pytest -q
