name: Build and Push Trainer Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/octa-trainer:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/octa-trainer:latest

      - name: Smoke run container (optional)
        if: ${{ env.REGISTRY_URL != '' }}
        run: |
          docker run --rm -v ${{ github.workspace }}/tests/data:/data ${{ env.REGISTRY_URL }}/octa-trainer:latest --parquet /data/sample_parquet.parquet --target target --version ci-registry-run --cv-folds 3 --hyperopt --backtest
