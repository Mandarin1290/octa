name: Feast Integration Test

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install "feast[redis]" duckdb pandas pyarrow mlflow evidently || true

      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            if redis-cli -h localhost -p 6379 ping | grep -q PONG; then
              echo redis up
              break
            fi
            sleep 1
          done

      - name: Run Feast apply
        run: |
          PYTHONPATH=. python3 scripts/feast_apply.py

      - name: Run online materialize verification
        run: |
          PYTHONPATH=. python3 scripts/feast_materialize_online.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feast-artifacts
          path: artifacts/
