apiVersion: batch/v1
kind: Job
metadata:
  name: octa-trainer-job
spec:
  template:
    spec:
      containers:
      - name: trainer
        image: octa-trainer:latest
        command: ["python3","-m","scripts.train_and_save","--parquet","/data/sample_parquet.parquet","--target","target","--version","k8s-run-1"]
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
      restartPolicy: Never
      volumes:
      - name: data
        hostPath:
          path: /workspace/tests/data
  backoffLimit: 2
